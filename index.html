```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff2d55">

<title>宿題管理</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont;
    background: #f2f2f7;
}
.app {
    max-width: 420px;
    margin: auto;
}
header {
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
    background: white;
    text-align: center;
}
.task {
    background: white;
    margin: 10px;
    padding: 12px;
    border-radius: 15px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}
.completed {
    opacity: 0.5;
    text-decoration: line-through;
}
.danger { border-left: 6px solid #ff3b30; }
.warn { border-left: 6px solid #ff9500; }
.fab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #ff2d55;
    color: white;
    font-size: 30px;
    border: none;
}
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    justify-content: center;
    align-items: center;
}
.modal-content {
    background: white;
    padding: 20px;
    border-radius: 15px;
    width: 80%;
}
input, select {
    width: 100%;
    margin: 5px 0;
    padding: 8px;
}
button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    border-radius: 10px;
    border: none;
    background: #007aff;
    color: white;
}
.delete {
    background: #ccc;
}
</style>
</head>

<body>

<div class="app">
<header>📚 宿題管理</header>
<div id="list"></div>
</div>

<button class="fab" onclick="openModal()">＋</button>

<div class="modal" id="modal">
  <div class="modal-content">
    <select id="subject">
        <option>言語文化</option>
        <option>現代の国語</option>
        <option>数学P</option>
        <option>数学Q</option>
        <option>英語コミュニケーションI</option>
        <option>英語論理表現I</option>
        <option>英語LL（多読）</option>
        <option>英語LL（ネイティブ）</option>
        <option>化学基礎</option>
        <option>生物基礎</option>
        <option>物理基礎</option>
        <option>歴史総合</option>
        <option>公共</option>
        <option>その他</option>
    </select>

    <input type="text" id="name" placeholder="宿題内容">
    <input type="date" id="date">

    <button onclick="addTask()">追加</button>
  </div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function save() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function openModal() {
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function addTask() {
    const subject = document.getElementById("subject").value;
    const name = document.getElementById("name").value;
    const date = document.getElementById("date").value;

    if (!name || !date) return alert("入力不足");

    tasks.push({subject, name, date, completed: false});
    save();
    render();
    closeModal();

    document.getElementById("name").value = "";
}

function toggleComplete(i) {
    tasks[i].completed = !tasks[i].completed;
    save();
    render();
}

function deleteTask(i) {
    tasks.splice(i, 1);
    save();
    render();
}

function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    const today = new Date();

    tasks.sort((a,b) => new Date(a.date) - new Date(b.date));

    tasks.forEach((t, i) => {
        const dl = new Date(t.date);
        const diff = Math.ceil((dl - today)/(1000*60*60*24));

        if (t.completed && diff < 0) return;

        const div = document.createElement("div");
        div.className = "task";

        if (t.completed) div.classList.add("completed");
        if (!t.completed && diff <= 0) div.classList.add("danger");
        else if (!t.completed && diff <= 2) div.classList.add("warn");

        div.innerHTML = `
            <input type="checkbox" ${t.completed ? "checked" : ""} onclick="toggleComplete(${i})">
            <b>${t.subject}</b><br>
            ${t.name}<br>
            締切: ${t.date}（あと${diff}日）<br>
            <button class="delete" onclick="deleteTask(${i})">削除</button>
        `;

        list.appendChild(div);
    });
}

render();

// Service Worker登録（PWA）
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}
</script>

</body>
</html>
